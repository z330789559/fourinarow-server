version: '3'

name: fourinarow-server
services:
  server:
    build: .
    environment:
      - DATABASE_URL=******postgres:5432/fourinarow
      - BIND=0.0.0.0:8080
      # WeChat mini-game credentials (set in .env or as secrets)
      - WECHAT_APPID=${WECHAT_APPID:-}
      - WECHAT_SECRET=${WECHAT_SECRET:-}
      # Douyin mini-game credentials
      - DOUYIN_APPID=${DOUYIN_APPID:-}
      - DOUYIN_SECRET=${DOUYIN_SECRET:-}
      # Email feedback
      - GMAIL_MAIL_FROM=${GMAIL_MAIL_FROM:-}
      - GMAIL_MAIL_TO=${GMAIL_MAIL_TO:-}
      - GMAIL_PW=${GMAIL_PW:-}
    expose:
      - 8080
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.fourinarow-server.rule: "Host(`fourinarow.ffactory.me`)"
      traefik.http.routers.fourinarow-server.entrypoints: "https"
      traefik.http.services.fourinarow-server.loadbalancer.server.port: "8080"
    networks:
      - default
      - traefik

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: fourinarow
      POSTGRES_PASSWORD: fourinarow
      POSTGRES_DB: fourinarow
    expose:
      - 5432
    volumes:
      - ./db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fourinarow"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  traefik:
    external: true
    name: traefik_proxy
